<svg viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#1c4a72" stroke-width="1"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8fd6ff"/>
    </marker>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1400" height="900" fill="#0a2540"/>
  <rect x="0" y="0" width="1400" height="900" fill="url(#grid)"/>
  <rect x="10" y="10" width="1380" height="880" fill="none" stroke="#3a7ca8" stroke-width="2"/>
  <rect x="20" y="20" width="1360" height="860" fill="none" stroke="#3a7ca8" stroke-width="1"/>

  <!-- title -->
  <text x="40" y="55" fill="#e8f4ff" font-size="22" letter-spacing="2">OPENAVSWITCH — PHASE 1 SIGNAL PATH</text>
  <text x="40" y="76" fill="#7fb8de" font-size="13" letter-spacing="1">4x HDMI IN (ASYNC, MISMATCHED RES/RATE) &#8594; SEAMLESS SWITCH+SCALE &#8594; 1x HDMI OUT</text>
  <line x1="40" y1="86" x2="1360" y2="86" stroke="#3a7ca8" stroke-width="1"/>

  <!-- channel labels -->
  <g font-size="12" fill="#bfe4ff">
    <text x="60" y="105">CH0 &#183; 1920x1080@60 (matched)</text>
    <text x="60" y="255">CH1 &#183; 3840x2160@30 (2x upscale)</text>
    <text x="60" y="405">CH2 &#183; 1280x720@60 (2x downscale)</text>
    <text x="60" y="555">CH3 &#183; 720x480@59.94 (non-integer 4:3)</text>
  </g>

  <!-- input connector blocks -->
  <g stroke="#8fd6ff" stroke-width="1.5" fill="#0f3355">
    <rect x="60" y="115" width="130" height="50" rx="3"/>
    <rect x="60" y="265" width="130" height="50" rx="3"/>
    <rect x="60" y="415" width="130" height="50" rx="3"/>
    <rect x="60" y="565" width="130" height="50" rx="3"/>
  </g>
  <g font-size="13" fill="#e8f4ff" text-anchor="middle">
    <text x="125" y="145">HDMI IN 0</text>
    <text x="125" y="295">HDMI IN 1</text>
    <text x="125" y="445">HDMI IN 2</text>
    <text x="125" y="595">HDMI IN 3</text>
  </g>

  <!-- capture blocks -->
  <g stroke="#8fd6ff" stroke-width="1.5" fill="#0f3355">
    <rect x="290" y="115" width="200" height="50" rx="3"/>
    <rect x="290" y="265" width="200" height="50" rx="3"/>
    <rect x="290" y="415" width="200" height="50" rx="3"/>
    <rect x="290" y="565" width="200" height="50" rx="3"/>
  </g>
  <g font-size="12.5" fill="#e8f4ff" text-anchor="middle">
    <text x="390" y="138">frame_buffer_channel</text>
    <text x="390" y="154" font-size="10.5" fill="#8fd6ff">double-buffered, CDC-safe</text>
    <text x="390" y="288">frame_buffer_channel</text>
    <text x="390" y="304" font-size="10.5" fill="#8fd6ff">double-buffered, CDC-safe</text>
    <text x="390" y="438">frame_buffer_channel</text>
    <text x="390" y="454" font-size="10.5" fill="#8fd6ff">double-buffered, CDC-safe</text>
    <text x="390" y="588">frame_buffer_channel</text>
    <text x="390" y="604" font-size="10.5" fill="#8fd6ff">double-buffered, CDC-safe</text>
  </g>

  <!-- scaler blocks -->
  <g stroke="#8fd6ff" stroke-width="1.5" fill="#0f3355">
    <rect x="580" y="115" width="180" height="50" rx="3"/>
    <rect x="580" y="265" width="180" height="50" rx="3"/>
    <rect x="580" y="415" width="180" height="50" rx="3"/>
    <rect x="580" y="565" width="180" height="50" rx="3"/>
  </g>
  <g font-size="12.5" fill="#e8f4ff" text-anchor="middle">
    <text x="670" y="138">nn_scaler</text>
    <text x="670" y="154" font-size="10.5" fill="#8fd6ff">per-channel, fixed-point</text>
    <text x="670" y="288">nn_scaler</text>
    <text x="670" y="304" font-size="10.5" fill="#8fd6ff">per-channel, fixed-point</text>
    <text x="670" y="438">nn_scaler</text>
    <text x="670" y="454" font-size="10.5" fill="#8fd6ff">per-channel, fixed-point</text>
    <text x="670" y="588">nn_scaler</text>
    <text x="670" y="604" font-size="10.5" fill="#8fd6ff">per-channel, fixed-point</text>
  </g>

  <!-- connecting lines: input -> capture -> scaler -->
  <g stroke="#8fd6ff" stroke-width="1.5" marker-end="url(#arrow)" fill="none">
    <line x1="190" y1="140" x2="286" y2="140"/>
    <line x1="190" y1="290" x2="286" y2="290"/>
    <line x1="190" y1="440" x2="286" y2="440"/>
    <line x1="190" y1="590" x2="286" y2="590"/>
    <line x1="490" y1="140" x2="576" y2="140"/>
    <line x1="490" y1="290" x2="576" y2="290"/>
    <line x1="490" y1="440" x2="576" y2="440"/>
    <line x1="490" y1="590" x2="576" y2="590"/>
  </g>

  <!-- converge lines: scaler -> crossbar -->
  <g stroke="#8fd6ff" stroke-width="1.5" fill="none">
    <path d="M 760 140 H 840 V 340 H 900" marker-end="url(#arrow)"/>
    <path d="M 760 290 H 900" marker-end="url(#arrow)"/>
    <path d="M 760 440 H 900" marker-end="url(#arrow)"/>
    <path d="M 760 590 H 840 V 390 H 900" marker-end="url(#arrow)"/>
  </g>

  <!-- crossbar block -->
  <g stroke="#ffd27f" stroke-width="2" fill="#2a2410">
    <rect x="900" y="300" width="220" height="140" rx="4"/>
  </g>
  <g font-size="14" fill="#fff1d6" text-anchor="middle">
    <text x="1010" y="345">output_crossbar</text>
  </g>
  <g font-size="10.5" fill="#ffd27f" text-anchor="middle">
    <text x="1010" y="365">seamless switch —</text>
    <text x="1010" y="380">select+buffer latched only</text>
    <text x="1010" y="395">at output frame boundary</text>
    <text x="1010" y="415">(no cross-frame mixing)</text>
  </g>

  <!-- control input into crossbar -->
  <g stroke="#8fd6ff" stroke-width="1.5" fill="#0f3355">
    <rect x="900" y="120" width="220" height="50" rx="3"/>
  </g>
  <text x="1010" y="150" font-size="13" fill="#e8f4ff" text-anchor="middle">channel_select</text>
  <path d="M 1010 170 V 296" stroke="#8fd6ff" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="1010" y="188" font-size="10.5" fill="#8fd6ff" text-anchor="middle">(host / future control plane)</text>

  <!-- crossbar -> timing_gen -->
  <path d="M 1120 370 H 1180" stroke="#8fd6ff" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- timing_gen block -->
  <g stroke="#8fd6ff" stroke-width="1.5" fill="#0f3355">
    <rect x="1180" y="330" width="150" height="80" rx="3"/>
  </g>
  <g font-size="12.5" fill="#e8f4ff" text-anchor="middle">
    <text x="1255" y="365">timing_gen</text>
    <text x="1255" y="382" font-size="10" fill="#8fd6ff">outputs x/y,</text>
    <text x="1255" y="396" font-size="10" fill="#8fd6ff">not flat addr</text>
  </g>

  <!-- output arrow down to HDMI OUT -->
  <path d="M 1255 410 V 470" stroke="#8fd6ff" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <g stroke="#8fd6ff" stroke-width="1.5" fill="#0f3355">
    <rect x="1160" y="470" width="190" height="50" rx="3"/>
  </g>
  <text x="1255" y="500" font-size="13" fill="#e8f4ff" text-anchor="middle">HDMI OUT &#183; 3840x2160@60</text>

  <!-- sync_2ff note -->
  <text x="40" y="700" font-size="11" fill="#7fb8de">sync_2ff.sv — shared CDC synchronizer primitive used across all 4 capture channels</text>

  <!-- status footer -->
  <line x1="40" y1="730" x2="1360" y2="730" stroke="#3a7ca8" stroke-width="1"/>
  <g font-size="11.5" fill="#7fb8de">
    <text x="40" y="755">STATUS: logic/simulation track proven in Icarus Verilog (sim/tb_top.sv) — no board, no synthesis, no real silicon yet.</text>
    <text x="40" y="775">Verified: no cross-frame mixing on switch; decoded pixel position matches independent nearest-neighbor reference model.</text>
  </g>

  <!-- title block, engineering-drawing style -->
  <g stroke="#3a7ca8" stroke-width="1" fill="none">
    <rect x="1040" y="800" width="320" height="70"/>
    <line x1="1040" y1="822" x2="1360" y2="822"/>
    <line x1="1040" y1="844" x2="1360" y2="844"/>
    <line x1="1180" y1="800" x2="1180" y2="870"/>
  </g>
  <g font-size="11" fill="#bfe4ff">
    <text x="1050" y="815">PROJECT</text>
    <text x="1190" y="815">OpenAVSwitch</text>
    <text x="1050" y="837">SHEET</text>
    <text x="1190" y="837">Phase 1 — signal path</text>
    <text x="1050" y="859">STATUS</text>
    <text x="1190" y="859">Pre-hardware / sim only</text>
  </g>
</svg>
